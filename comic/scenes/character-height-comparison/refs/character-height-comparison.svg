  <text x="700" y="176" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111111">Locked height tiers</text>
  <text x="700" y="209" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111111">Muci = Artrans shorter tier, preserving the current Muci / Padaruna ratio.</text>
  <text x="700" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#111111">Padaruna = Padarana = Snacri standard tier. Nia = about 1.10x Padaruna.</text>
